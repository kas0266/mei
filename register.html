<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>西安外事学院 - 用户注册</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // JS表单验证
        function checkRegister() {
            var username = document.getElementById("username").value.trim();
            var pwd = document.getElementById("pwd").value;
            var repwd = document.getElementById("repwd").value;
            var phone = document.getElementById("phone").value;
            var email = document.getElementById("email").value;

            if (username.length < 2) {
                alert("用户名至少2个字符");
                return false;
            }
            if (pwd.length < 6) {
                alert("密码至少6位");
                return false;
            }
            if (pwd !== repwd) {
                alert("两次密码不一致");
                return false;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert("手机号格式错误");
                return false;
            }
            if (!/^\w+([-+.]\w+)*@\w+([-.]\w+)*\.\w+([-.]\w+)*$/.test(email)) {
                alert("邮箱格式错误");
                return false;
            }
            alert("注册验证通过！");
            return true;
        }
    </script>
</head>
<body>
<div class="header">
    <h1>用户注册</h1>
</div>

<div class="register-container">
    <form onsubmit="return checkRegister()">
        <div class="form-item">
            <label>用户名：</label>
            <input type="text" id="username" placeholder="请输入姓名/学号">
        </div>
        <div class="form-item">
            <label>密码：</label>
            <input type="password" id="pwd" placeholder="6-16位字母/数字">
        </div>
        <div class="form-item">
            <label>确认密码：</label>
            <input type="password" id="repwd" placeholder="再次输入密码">
        </div>
        <div class="form-item">
            <label>手机号：</label>
            <input type="text" id="phone" placeholder="请输入手机号">
        </div>
        <div class="form-item">
            <label>邮箱：</label>
            <input type="text" id="email" placeholder="请输入邮箱">
        </div>
        <div class="form-btn">
            <input type="submit" value="立即注册" class="submit-btn">
            <a href="index.html" class="back-btn">返回首页</a>
        </div>
    </form>
</div>

<div class="footer">
    <p>© 2026 西安外事学院 版权所有</p>
</div>
</body>
</html>
